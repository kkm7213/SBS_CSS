<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>표 실습</title>
    <style>
        table{
            border: 1px solid #000;
            border-collapse: collapse;
            width: 200px;
            text-align: center;
            caption-side: bottom;
        }
        td{
            border: 1px solid black;
        }
        th{
            border: 1px solid black;
            background-color: lightpink;
        }
        .a{
            font-weight: bold;
            background-color: lightpink;
        }

    </style>
</head>
<body>
    <table>
        <tr>
            <th>구분</th>
            <th>성인</th>
            <th>독서자</th>
        </tr>
        <tr>
            <td class="a">종이책</td>
            <td>6.1권</td>
            <td>11.8권</td>
        </tr>
        <tr>
            <td class="a">전자책</td>
            <td>1.2권</td>
            <td>7.1권</td>
        </tr>
        <tr>
            <td class="a">오디오북</td>
            <td>0.2권</td>
            <td>5.5권</td>
        </tr>
        <caption>2019 국민 도서실태</caption>
    </table>

</body>
</html>
