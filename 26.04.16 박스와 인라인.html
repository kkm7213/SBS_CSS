<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>박스와 인라인</title>
</head>
<body>
    <h2>블록레벨 요소(h1~h6)</h2>
    <h3>영역 관련 태그들</h3>
    <div>div</div>
    <section>section</section>
    <article>article</article>
    <aside>aside</aside>
    <header>header</header>
    <main>main</main>
    <footer>footer</footer>
    <nav>nav</nav>
    <hr>

    <h3>텍스트 관련 태그들</h3>
    <p>p</p>
    <blockquote>blockquote</blockquote>
    <pre>pre</pre>
    <code>code</code>

    <h3>목록 관련 태그들</h3>
    <ul><li>ul-li</li></ul>
    <ol><li>ol-li</li></ol>
    <dl><dt>dl-dt</dt><dd>dl-dd</dd></dl>

    <h2>인라인 태그</h2>
    <span>span</span>
    <a href="">a</a>
    <b>b</b>
    <strong>strong</strong>
    <em>em</em>
    <i>i</i>
    <mark>mark</mark>
    <small>small</small>
    <sub>sub</sub>
    <sup>sup</sup>
    <del>del</del>
    <ins>ins</ins>
    <abbr title="">abbr</abbr>
    <q>q-인용구</q>
    <cite>cite</cite>
    <img src="#" alt="img">
</body>
</html>
