<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <style>
        *{
            margin: 0;
            padding: 0;
        }
        body{
            width: 500px;
            margin: auto;
        }
        h2{
            background-color: black;
            color: white;
            text-align: left;
        }
        div{
            text-align: center;
            border: black solid 1px;

        }
        p{
            padding: 20px;
        }
        #p1{
            padding: 0 0 10px 0;
        }
        h3{
            color: red;
            padding: 10px 0 0 0;
        }
        span{
            color: blue;
        }
    </style>
</head>
<body>
    <div id="container">
        <section>
            <h2>확인하세요</h2>

            <h3>주문 및 배송</h3><br>
            <p id="p1">
                <span>오후 2시 이전</span> 주문건은 당일 발송합니다 <br>
                2시 이후 주문건은 다음날 발송합니다(주말제외)
            </p>

            <h3>교환 및 환불</h3>
            <p>
                불만족시 <span>100% 환불</span>해 드립니다 <br>
                고객센터로 전화주세요
            </p>
            <hr>

            <h3>고객센터</h3>
            <p>
                0000-0000 <br>
                상담시간 : 오전 9시 ~ 오후 6시 (토/일, 공휴일 휴무)
            </p>
        </section>
    </div>

</body>
</html>
