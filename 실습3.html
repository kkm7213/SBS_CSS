<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <style>
        *{
            margin: 0;
            padding: 0;
        }
        .main_container{
            height: 300px;
            background-image: url("https://images.unsplash.com/photo-1560806887-1e4cd0b6cbd6?w=500&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8NHx8YXBwbGV8ZW58MHx8MHx8fDA%3D");
            background-position: center;
            background-repeat: no-repeat;
            background-size: cover;
            overflow: hidden;
            position: relative;
        }
        .main_container > div {
            background-color: rgba(0,0,0,0.5);
            text-align: left;
            padding: 5px 10px;
            position: absolute;
            bottom: 0;
            width: 100%;
        }
        .main_container h1{
            color: white;
            font-size: 24px;
        }
        .main_container p{
            color: white;
        }
        body{
            width: 500px;
            margin: auto;
        }
        h2{
            background-color: black;
            color: white;
            text-align: left;
        }
        div{
            text-align: center;
            border: black solid 1px;

        }
        p{
            padding: 20px;
        }
        #p1{
            padding: 0 0 10px 0;
        }
        h3{
            color: red;
            padding: 10px 0 0 0;
        }
        span{
            color: blue;
        }
    </style>
</head>
<body>
    <section class="main_container">
        <div>
            <h2 class="img">가정용 꿀사과</h2>
            <p>
                흠집이 있고 약간은 못생겼지만 맛과 영양은 그대로입니다 <br>
                드십쇼
            </p>
        </div>
    </section>
    <div id="container">
        <section>
            <h2>확인하세요</h2>

            <h3>주문 및 배송</h3><br>
            <p id="p1">
                <span>오후 2시 이전</span> 주문건은 당일 발송합니다 <br>
                2시 이후 주문건은 다음날 발송합니다(주말제외)
            </p>

            <h3>교환 및 환불</h3>
            <p>
                불만족시 <span>100% 환불</span>해 드립니다 <br>
                고객센터로 전화주세요
            </p>
            <hr>

            <h3>고객센터</h3>
            <p>
                0000-0000 <br>
                상담시간 : 오전 9시 ~ 오후 6시 (토/일, 공휴일 휴무)
            </p>
        </section>
    </div>

</body>
</html>
