<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>그라데이션</title>
    <style>
        div{
            width: 300px;
            height: 300px;
            border: 1px solid black;
        }
        .grad{
            /* 왼쪽 위에서 오른쪽 아래 방향으로, 파랑에서 흰색으로 변하기*/
            background: linear-gradient(to right bottom, blue, white);
        }
        .grad2{
            /* 오른쪽 위 45도 방향으로*/
            background: linear-gradient(45deg, red, white);
        }
        .grad3{
            /*위에서 아래로 시작해서 30%정도 지점까지는 변하고, 그 이후에는 하늘색으로*/
            background: linear-gradient(to bottom, gold, white 30%, powderblue);
        }
        .grad4{
            background: radial-gradient(circle, blue, white);
        }
        .grad5{
            background: radial-gradient(circle, white, yellow, red);
        }
        .grad6{
            background: radial-gradient(circle closest-side at 90% 10%,white, yellow, green);
        }
        .grad7{
            background: radial-gradient(circle at 20% 20%, white, blue);
        }
        .grad8{
            background: repeating-linear-gradient(yellow, red 20%);
        }
        .grad9{
            background: repeating-radial-gradient(circle at 20% 20%, white, blue);
        }
        .grad10{

        }
    </style>

</head>
<body>
    <div class="grad"></div>
    <div class="grad2"></div>
    <div class="grad3"></div>

    <div class="grad4"></div>
    <div class="grad5"></div>
    <div class="grad6"></div>
    <div class="grad7"></div>

    <div class="grad8"></div>
    <div class="grad9"></div>
    <div class="grad10"></div>
</body>
</html>
