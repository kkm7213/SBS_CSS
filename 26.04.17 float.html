<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <style>
        *{
            margin: 0;
            padding: 0;
        }
        #box1{
            /*
             float: 요소의 흐름 제어. 요소를 왼쪽이나 오른쪽으로 띄워 배치
             뉴스 기사 등, 이미지와 글이 이어서 보여야 하는 경우 사용
             absolute와 다른 점: 다른 요소에 배치 영향 끼침
            */
            background-color: aquamarine;
            float: left;/* 이 요소는 왼쪽 끝으로 말고, 다른 요소들은 오른쪼에 이어서 배치하세요. */
        }

        #box2{
            background-color: aqua;
            float: left;
        }
        #box3{
            background-color: darkorchid;
            width: 200px;
            float: right;
        }
        #box4{
            background-color: lightpink;
            /* 이전 요소가 float가 존재하면, 다음 요소도 자동으로 영향을 받아버림 */
            /* 영향을 받지 않으려면, float 속성을 해제 해야 함*/
            /* clear: both 으로 해제 (both 외 left, right 사용 가능)*/
            clear: both;

        }
        section{
            /* 자식 요소 전부가 float 속성이 있으면, 부모의 크기가 없어짐 */
            /* 자식이 없는 것처럼 판단됨 */
            /* height: 0 의 상태=> 높이를 인식하지 못함. */
            background-color: aqua;
        }
        img{
            float: left;
        }
        p{
            width: 200px;
            float: left;
        }
    </style>



</head>
<body>
    <div id="box1">박스1</div>
    <div id="box2">박스2</div>
    <div id="box3">박스3</div>
    <div id="box4">박스4</div>
    <section>
        <img src="https://upload.wikimedia.org/wikipedia/ko/a/a6/Pok%C3%A9mon_Pikachu_art.png" alt="#">
        <p>
            Lorem ipsum dolor sit amet, consectetur adipisicing elit. Animi assumenda blanditiis cumque deserunt ducimus error esse, exercitationem fugiat in incidunt nam nobis odit, officia perferendis possimus repellendus saepe. Molestiae, praesentium!
        </p>
    </section>
</body>
</html>
