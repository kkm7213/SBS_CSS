<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>탐라국 입춘굿</title>
    <style>
        *{font-family: KCC-안창호}
        .j{color: aqua}
        .t{font-size: 20px; color: red;}
        sup{font-style: italic}
        div{text-align: center;}
        h1 > span{background-color: blue; color: white}
    </style>
</head>
<body>
    <h1>
        <span>
            탐라국 입춘굿
        </span>
    </h1>
    <p class="o">
        <b>
            <span class="j">제주</span>도의 문화축제 중에서 유일하게 <span class="t">탐라 시대부터 내려온 축제</span>이다.
        </b>
    </p>
    <p>
        <div>
            <span class="j">제주</span>에서 입춘은 새철 <sup>(<span class="j">제주</span>어, 샛절)</sup>드는 날이라 한다. <br>
            하늘의 1만 8,000 신이 지상으로 내려와 새해 일들을 시작하는 때다.
        </div>
    </p>

</body>
</html>
