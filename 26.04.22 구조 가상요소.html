<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>구조 가상 요소</title>
</head>
<style>
    ul > li:first-child{
        color: green;
    }
    ul > li:last-child{
        color: gold;
    }
    /* 6번째 li 선택 해줘 */
    ul > li:nth-child(6){
        color: blue;
    }
    /* even: 짝수, odd: 홀수 */
    ul > li:nth-child(even){
        background-color: chocolate;
    }
    ul > li:nth-child(2n+1){
        font-size: 20px;
    }

    section{
        background-color: ivory;
        /* 양 옆만 20px 안쪽으로 밀어라 */
        padding: 0 20px;
    }
    section > div{
        /* 위 아래 10px 간격 띄워라 */
        margin: 10px 0;
    }
    section > div:first-child::before{
        content: 'ㅋ.ㅋ';
    }
    section > div:nth-child(2)::before{
        content: '🎨';
    }
    section > div:nth-child(3)::before{
        content: ''; /* 빈문자열 */
        background-image: url('https://img.hankyung.com/photo/201912/3debd29d73cad0761a68f61e07c051f9.jpg');
        background-position: center;
        background-size: cover;
        background-repeat: no-repeat;
        display: inline-block;
        width: 200px;
        height: 200px;
    }

</style>
<body>
<ul>
    <li class="li1">리스트1</li>
    <li class="li2">리스트2</li>
    <li class="li3">리스트3</li>
    <li class="li4">리스트4</li>
    <li class="li5">리스트5</li>
    <li class="li6">리스트6</li>
    <li class="li7">리스트7</li>
    <li class="li8">리스트8</li>
    <li class="li9">리스트9</li>
    <li class="li10">리스트10</li>
</ul>

<section>
    <div>목록1</div>
    <div>목록2</div>
    <div>목록3</div>
    <div>목록4</div>
    <div>목록5</div>
</section>

</body>
</html>
