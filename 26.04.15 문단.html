<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>문단</title>
    <style>
        ul{
            border: 1px solid blue;
            /*list-style-position: inside;*/
            /*list-style-type: "🐱‍👤";*/

            list-style: none;'

        }
        table{
            border: 3px solid blue;
            width: 300px;
            text-align: center;
            border-collapse: separate;
            border-spacing: 5px;
        }
        td{
            border: 3px solid green;
            width: 20px;
        }
        .col1{}

</head>
<body>
    <ul>
        <li>UL-LI1</li>
        <li>UL-LI2</li>
        <li>UL-LI3</li>
    </ul>
    <ol>
        <li>OL-LI1</li>
        <li>OL-LI2</li>
        <li>OL-LI3</li>
    </ol>

    <hr>
    <table>
        <tr>
            <td>1</td>

            <td>3</td>
        </tr>
        <tr>
            <td>4</td>
            <td>5</td>
            <td>6</td>
        </tr>
    </table>
    <table>
        <colgroup>
            <col class="col1">
            <col class="col2">
            <col class="col3">
        </colgroup>
        <thead>
            <tr>
                <th>
                    A
                </th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>
                    B
                </td>
            </tr>
        </tbody>
        <tfoot>
            <tr>
                <td>
                    C
                </td>
            </tr>
        </tfoot>

    </table>

</html>
